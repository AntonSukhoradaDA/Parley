services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: parley
      POSTGRES_USER: parley
      POSTGRES_PASSWORD: parley
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parley"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://parley:parley@db:5432/parley
      JWT_SECRET: ${JWT_SECRET:-parley-dev-secret-change-in-production}
      PORT: "3000"
      FILES_DIR: /var/parley/files
    volumes:
      - uploads:/var/parley/files

  client:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${PARLEY_PORT:-8080}:80"

volumes:
  pgdata:
  uploads:
