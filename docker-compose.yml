services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: parley
      POSTGRES_USER: parley
      POSTGRES_PASSWORD: parley
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parley"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILHOG_UI_PORT:-8025}:8025"

  prosody:
    build: ./prosody
    restart: unless-stopped
    environment:
      XMPP_DOMAIN: ${XMPP_DOMAIN:-parley.local}
      XMPP_COMPONENT_SECRET: ${XMPP_COMPONENT_SECRET:-parley-bridge-secret}
      XMPP_ADMIN_REST_SECRET: ${XMPP_ADMIN_REST_SECRET:-parley-admin-rest-secret}
      XMPP_PEER_DOMAIN: ${XMPP_PEER_DOMAIN:-}
      PARLEY_AUTH_URL: ${PARLEY_AUTH_URL:-http://server:3000/api/xmpp/auth}
    ports:
      - "${XMPP_C2S_PORT:-5222}:5222"
      - "${XMPP_S2S_PORT:-5269}:5269"
      - "${XMPP_COMPONENT_PORT:-5347}:5347"
      - "${XMPP_ADMIN_REST_PORT:-5280}:5280"
    volumes:
      - prosodydata:/var/lib/prosody

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
      prosody:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://parley:parley@db:5432/parley
      JWT_SECRET: ${JWT_SECRET:-parley-dev-secret-change-in-production}
      PORT: "3000"
      FILES_DIR: /var/parley/files
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      MAIL_FROM: ${MAIL_FROM:-Parley <noreply@parley.local>}
      APP_URL: ${APP_URL:-http://localhost:8080}
      XMPP_ENABLED: ${XMPP_ENABLED:-true}
      XMPP_DOMAIN: ${XMPP_DOMAIN:-parley.local}
      XMPP_COMPONENT_HOST: ${XMPP_COMPONENT_HOST:-prosody}
      XMPP_COMPONENT_PORT: ${XMPP_COMPONENT_PORT_INTERNAL:-5347}
      XMPP_COMPONENT_DOMAIN: ${XMPP_COMPONENT_DOMAIN:-bridge.parley.local}
      XMPP_COMPONENT_SECRET: ${XMPP_COMPONENT_SECRET:-parley-bridge-secret}
      XMPP_MUC_DOMAIN: ${XMPP_MUC_DOMAIN:-conference.parley.local}
      XMPP_ADMIN_REST_URL: ${XMPP_ADMIN_REST_URL:-http://prosody:5280/parley_admin}
      XMPP_ADMIN_REST_SECRET: ${XMPP_ADMIN_REST_SECRET:-${XMPP_COMPONENT_SECRET:-parley-bridge-secret}}
    volumes:
      - uploads:/var/parley/files
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  client:
    build:
      context: ./client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${PARLEY_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  uploads:
  prosodydata:
